<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body  class="min-h-screen flex items-center justify-center bg-red-600">
     <!-- Card -->
  <div class="w-full max-w-sm text-white p-8 rounded-md ">

    <!-- Título -->
    <h1 class="text-3xl font-light text-center mb-6">
      Criar Conta
    </h1>

    <!-- Redes sociais -->
    <div class="flex justify-center gap-4 mb-4">
      <button class="w-11 h-11 rounded-full flex items-center justify-center">
        <img src="./img/facebook-icon.png">
      </button>

      <button class="w-13 h-12 rounded-full flex items-center justify-center">
        <img src="./img/google-icon.png">
      </button>

      <button class="w-11 h-11 items-center justify-center ">
        <img src="./img/linkind-icon.png">
      </button>
    </div>

    <!-- Texto -->
    <p class="text-center text-sm mb-4">
      ou cadastre seu email
    </p>

    <!-- Formulário -->
    <form class="space-y-4">
      <input
        type="text"
        placeholder="Nome"
        class="w-full px-4 py-2 rounded-md bg-white text-gray-700 focus:outline-none border border-gray-300 focus:ring-2 focus:ring-red-300 focus:border-red-400"
      />

      <input
        type="email"
        placeholder="Email"
        class="w-full px-4 py-2 rounded-md bg-white text-gray-700 border border-gray-300 focus:outline-none focus:ring-2 focus:ring-red-300 focus:border-red-400"
      />

      <input
        type="password"
        placeholder="Senha"
        class="w-full px-4 py-2 rounded-md bg-white text-gray-700 border border-gray-300 focus:outline-none focus:ring-2 focus:ring-red-300 focus:border-red-400"
      />

      <!-- Botão -->
      <button
        type="submit"
        class="w-full border-2 border-white py-2 rounded-full font-semibold hover:bg-white hover:text-red-500 transition"
      >
        CADASTRAR
      </button>
    </form>

    <!-- Login -->
    <p class="text-center text-sm mt-6">
      Já tem conta?
      <a href="#" class="font-semibold underline hover:text-gray-200">
        Login
      </a>
    </p>

  </div>

    
</body>
</html>
